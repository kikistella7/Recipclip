function guessTitle(url) {

const domain = u.hostname.replace(“www.”,””).replace(”.com”,””).replace(”.co.kr”,””).replace(”.kr”,””);

const clean = path.split(” “).filter(p=>p&&!/^\d+$/.test(p)).slice(0,4).join(” “);

function randomEmoji() {
return FOOD_EMOJIS[Math.floor(Math.random()*FOOD_EMOJIS.length)];
}

function load() {
try { return JSON.parse(localStorage.getItem(“recipebook_v3”)||”[]”); } catch { return []; }
}

function App() {
const [recipes, setRecipes] = useState(load);
const [activeCat, setActiveCat] = useState(“전체”);
const [showAdd, setShowAdd] = useState(false);
const [detail, setDetail] = useState(null);
// 편집 상태
const [editingId, setEditingId] = useState(null);

useEffect(()=>{ localStorage.setItem(“recipebook_v3”, JSON.stringify(recipes)); }, [recipes]);

const filtered = activeCat===“전체” ? recipes : recipes.filter(r=>r.category===activeCat);

const handleAdd = (url) => {
let u = url.trim();
if (!u) return;
if (!u.startsWith(“http”)) u = “https://”+u;
const recipe = {
id: Date.now().toString(),
url: u,
title: guessTitle(u),
category: “기타”,
emoji: randomEmoji(),
savedAt: new Date().toLocaleDateString(“ko-KR”),
};
setRecipes(p=>[recipe,…p]);
setShowAdd(false);
};

const handleUpdate = (id, changes) => {
setRecipes(p=>p.map(r=>r.id===id?{…r,…changes}:r));
setDetail(prev=>prev?{…prev,…changes}:prev);
};

const handleDelete = (id) => {
setRecipes(p=>p.filter(r=>r.id!==id));
setDetail(null);
};

return (
