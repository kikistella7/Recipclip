<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>레시피 북</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#2C2417"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="레시피북"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    html,body{height:100%;background:#F2EFE9;font-family:'Pretendard',-apple-system,sans-serif;overscroll-behavior:none;}
    ::-webkit-scrollbar{display:none;}
    input,button,select{font-family:inherit;}
    input::placeholder{color:#C4BAB0;}
    input:focus{outline:none;border-color:#2C2417!important;}

    #app{max-width:430px;margin:0 auto;min-height:100vh;background:#F2EFE9;position:relative;}

    #header{
      padding:max(52px,env(safe-area-inset-top,0px) + 16px) 20px 0;
      background:#F2EFE9;position:sticky;top:0;z-index:10;
    }
    .header-row{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:6px;}
    .header-sub{font-size:11px;color:#A8997E;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;margin-bottom:4px;}
    .header-title{font-size:28px;font-weight:800;color:#2C2417;letter-spacing:-0.5px;}
    .header-right{text-align:right;}
    .header-emoji{font-size:26px;display:block;}
    .header-count{font-size:11px;color:#A8997E;margin-top:2px;}

    #cats{display:flex;gap:8px;overflow-x:auto;padding:12px 0 14px;margin:0 -20px;padding-left:20px;padding-right:20px;}
    .cat-btn{padding:7px 14px;border-radius:100px;border:none;cursor:pointer;font-size:13px;font-weight:600;flex-shrink:0;transition:all .15s;white-space:nowrap;}
    .cat-btn.active{background:#2C2417;color:#F2EFE9;}
    .cat-btn:not(.active){background:#E8E3DA;color:#6B5E4A;}

    #list{padding:4px 16px max(100px,env(safe-area-inset-bottom,0px) + 80px);}

    #empty{text-align:center;padding:72px 20px;color:#A8997E;}
    #empty .big{font-size:52px;margin-bottom:12px;}
    #empty .t1{font-size:17px;font-weight:700;color:#6B5E4A;margin-bottom:6px;}
    #empty .t2{font-size:14px;line-height:1.7;}

    .card{background:#fff;border-radius:18px;padding:15px;margin-bottom:10px;
      box-shadow:0 2px 10px rgba(44,36,23,.06);cursor:pointer;
      display:flex;gap:12px;align-items:center;transition:transform .13s ease;}
    .card:active{transform:scale(.97);}
    .card-emoji{width:50px;height:50px;border-radius:13px;background:#F2EFE9;
      display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
    .card-body{flex:1;min-width:0;}
    .card-title{font-size:15px;font-weight:700;color:#2C2417;line-height:1.35;
      overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
    .card-meta{font-size:11px;color:#B0A494;margin-top:4px;}
    .card-arrow{color:#D4C9B5;font-size:18px;flex-shrink:0;}

    #fab{position:fixed;
      bottom:max(28px,env(safe-area-inset-bottom,0px) + 20px);
      left:50%;transform:translateX(calc(-50% + 90px));
      width:58px;height:58px;border-radius:29px;border:none;
      background:#2C2417;color:#F2EFE9;font-size:28px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 20px rgba(44,36,23,.35);transition:transform .13s ease;}
    #fab:active{transform:translateX(calc(-50% + 90px)) scale(.9);}

    .overlay{position:fixed;inset:0;background:rgba(44,36,23,.45);z-index:50;}
    .sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:430px;background:#fff;
      border-radius:26px 26px 0 0;z-index:51;
      padding-bottom:max(36px,env(safe-area-inset-bottom,0px) + 20px);
      animation:slideUp .36s cubic-bezier(.32,.72,0,1);}
    @keyframes slideUp{from{transform:translateX(-50%) translateY(100%);}to{transform:translateX(-50%) translateY(0);}}
    .handle{width:36px;height:4px;background:#E0D8CE;border-radius:2px;margin:12px auto 22px;}
    .si{padding:0 24px;}
    .si h2{font-size:22px;font-weight:800;color:#2C2417;margin-bottom:6px;}
    .si .sub{font-size:13px;color:#A8997E;margin-bottom:18px;}
    .inp{width:100%;padding:15px;border-radius:13px;border:2px solid #EDE8E0;font-size:15px;color:#2C2417;background:#F9F7F4;}
    .bp{width:100%;padding:16px;border-radius:14px;border:none;background:#2C2417;color:#F2EFE9;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px;}
    .bp:disabled{background:#E0D8CE;color:#A8997E;cursor:not-allowed;}
    .bg{flex:1;padding:13px;border-radius:14px;border:2px solid #E0D8CE;background:transparent;color:#6B5E4A;font-size:14px;font-weight:600;cursor:pointer;}
    .bd{flex:1;padding:13px;border-radius:14px;border:none;background:#FFF0F0;color:#FF3B30;font-size:14px;font-weight:600;cursor:pointer;}
    .hint{text-align:center;font-size:11px;color:#C4BAB0;margin-top:10px;}
    .det-ew{text-align:center;margin-bottom:12px;}
    .det-eb{width:68px;height:68px;border-radius:20px;background:#F2EFE9;display:inline-flex;align-items:center;justify-content:center;font-size:34px;}
    .det-title{text-align:center;font-size:19px;font-weight:800;color:#2C2417;margin-bottom:8px;line-height:1.35;}
    .tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
    .tag{font-size:12px;font-weight:600;color:#6B5E4A;background:#F2EFE9;padding:5px 12px;border-radius:100px;}
    .lbox{background:#F9F7F4;border-radius:12px;padding:12px 14px;margin-bottom:14px;}
    .llabel{font-size:10px;color:#A8997E;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
    .lurl{font-size:12px;color:#6B5E4A;word-break:break-all;line-height:1.4;}
    .btnlink{display:block;padding:16px;border-radius:14px;background:#2C2417;color:#F2EFE9;font-size:16px;font-weight:700;text-align:center;text-decoration:none;margin-bottom:10px;}
    .brow{display:flex;gap:10px;}
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-row">
      <div>
        <div class="header-sub">My Kitchen</div>
        <div class="header-title">레시피 북</div>
      </div>
      <div class="header-right">
        <span class="header-emoji">📖</span>
        <div class="header-count" id="count">0개 저장됨</div>
      </div>
    </div>
    <div id="cats"></div>
  </div>
  <div id="list"></div>
</div>
<button id="fab">+</button>

<script>
const CATS=["전체","한식","양식","일식","중식","베이킹","샐러드","간식","기타"];
const CE={"한식":"🍲","양식":"🍝","일식":"🍣","중식":"🥢","베이킹":"🧁","샐러드":"🥗","간식":"🍿","기타":"🍽️"};
const EM=["🍜","🍱","🥘","🍛","🥗","🍝","🍲","🥩","🍗","🧆","🥞","🍳","🫕","🥙","🧇","🍤"];

let recipes=[];
let cat="전체";
let editEmoji="🍽️";
let editCat="기타";

function load(){try{recipes=JSON.parse(localStorage.getItem("rcb_v4")||"[]");}catch{recipes=[];}}
function save(){localStorage.setItem("rcb_v4",JSON.stringify(recipes));}

function cleanTitle(raw){
  if(!raw) return null;
  const SITES=["만개의레시피","10000recipe","네이버","naver","유튜브","youtube","카카오","kakao","tistory","instagram","해먹남녀","haemukja","쿠킹로그","cookinglog","다음","daum","구글","google"];
  const isSite=s=>SITES.some(x=>s.toLowerCase().replace(/\s/g,"").includes(x.toLowerCase()));

  // 구분자로 분리 후 사이트명 아닌 파트 선택
  const parts=raw.split(/\s*[|ㅣ:：·\-—]\s*/).map(p=>p.trim()).filter(p=>p.length>=2);
  const best=parts.find(p=>!isSite(p)) || parts[0] || raw;

  let t=best
    .replace(/\[.*?\]/g,"").replace(/【.*?】/g,"").replace(/\(.*?\)/g,"")
    .replace(/^\s*\d+\.\s*/,"")
    .replace(/\s*(황금레시피|초간단|간단|쉬운|맛있는|황금|레시피|만들기)\s*$/,"")
    .trim();

  // 그래도 사이트명이면 null
  if(isSite(t)) return null;
  return t.length>=2 ? t : null;
}

async function fetchTitle(url){
  try{
    const res=await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}&meta=false`);
    const json=await res.json();
    const raw=json?.data?.title||"";
    return cleanTitle(raw);
  }catch{ return null; }
}

function fallbackTitle(url){
  try{
    const u=new URL(url.startsWith("http")?url:"https://"+url);
    const dom=u.hostname.replace("www.","");
    const map={"10000recipe.com":"만개의레시피","recipe.naver.com":"네이버레시피","youtube.com":"유튜브","youtu.be":"유튜브","haemukja.com":"해먹남녀","blog.naver.com":"네이버블로그","instagram.com":"인스타그램"};
    return map[dom]||dom.split(".")[0]||"레시피";
  }catch{return "레시피";}
}

function rndEmoji(){return EM[Math.floor(Math.random()*EM.length)];}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function render(){
  const filtered=cat==="전체"?recipes:recipes.filter(r=>r.cat===cat);
  document.getElementById("count").textContent=recipes.length+"개 저장됨";

  // cats
  document.getElementById("cats").innerHTML=CATS.map(c=>
    `<button class="cat-btn${c===cat?" active":""}" onclick="setCat('${c}')">${c!=="전체"?CE[c]+" ":""}${c}</button>`
  ).join("");

  // list
  const el=document.getElementById("list");
  if(!filtered.length){
    el.innerHTML=`<div id="empty"><div class="big">🍽️</div><div class="t1">아직 저장된 레시피가 없어요</div><div class="t2">+ 버튼으로<br>링크를 붙여넣어보세요</div></div>`;
    return;
  }
  el.innerHTML=filtered.map(r=>`
    <div class="card" onclick="openDetail('${r.id}')">
      <div class="card-emoji">${r.emoji}</div>
      <div class="card-body">
        <div class="card-title">${esc(r.title)}</div>
        <div class="card-meta">${CE[r.cat]||"🍽️"} ${r.cat} · ${r.date}</div>
      </div>
      <div class="card-arrow">›</div>
    </div>`).join("");
}

function setCat(c){cat=c;render();}

function closeOverlay(){document.getElementById("ov")?.remove();}

function openOverlay(html){
  closeOverlay();
  const d=document.createElement("div");
  d.className="overlay";d.id="ov";
  d.innerHTML=html;
  document.body.appendChild(d);
  d.addEventListener("click",e=>{if(e.target.id==="ov")closeOverlay();});
}

function openAdd(){
  openOverlay(`<div class="sheet"><div class="handle"></div><div class="si">
    <h2>링크 추가</h2>
    <p class="sub">레시피 링크만 붙여넣으면 바로 저장돼요</p>
    <input class="inp" id="ui" placeholder="https://recipe.naver.com/..." oninput="document.getElementById('sb').disabled=!this.value.trim()"/>
    <button class="bp" id="sb" onclick="addRecipe()" disabled>저장하기</button>
    <div class="hint">저장 후 이름·카테고리 수정 가능해요</div>
  </div></div>`);
  const inp=document.getElementById("ui");
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&inp.value.trim())addRecipe();});
  setTimeout(()=>inp.focus(),50);
}

async function addRecipe(){
  const inp=document.getElementById("ui");
  let url=inp.value.trim();
  if(!url)return;
  if(!url.startsWith("http"))url="https://"+url;
  // 로딩 표시
  const btn=document.getElementById("sb");
  btn.disabled=true; btn.textContent="분석 중...";
  const fetched=await fetchTitle(url);
  const title=fetched||fallbackTitle(url);
  recipes.unshift({id:Date.now().toString(),url,title,cat:"기타",emoji:rndEmoji(),date:new Date().toLocaleDateString("ko-KR")});
  save();closeOverlay();render();
}

function openDetail(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  openOverlay(`<div class="sheet"><div class="handle"></div><div class="si" id="di">
    <div class="det-ew"><div class="det-eb">${r.emoji}</div></div>
    <div class="det-title">${esc(r.title)}</div>
    <div class="tags"><span class="tag">${CE[r.cat]||"🍽️"} ${r.cat}</span><span class="tag">${r.date}</span></div>
    <div class="lbox"><div class="llabel">링크</div><div class="lurl">${esc(r.url)}</div></div>
    <a class="btnlink" href="${esc(r.url)}" target="_blank">🔗 레시피 보러 가기</a>
    <div class="brow">
      <button class="bg" onclick="openEdit('${r.id}')">✏️ 수정</button>
      <button class="bd" onclick="delRecipe('${r.id}')">삭제</button>
    </div>
  </div></div>`);
}

function delRecipe(id){
  if(!confirm("삭제할까요?"))return;
  recipes=recipes.filter(r=>r.id!==id);
  save();closeOverlay();render();
}

function openEdit(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  editEmoji=r.emoji;editCat=r.cat;
  document.getElementById("di").innerHTML=`
    <h2>수정하기</h2>
    <p style="font-size:12px;font-weight:700;color:#6B5E4A;margin-bottom:8px;">이모지</p>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;" id="ep">
      ${EM.map(e=>`<button onclick="pickE(this,'${e}')" style="width:38px;height:38px;border-radius:10px;border:2px solid ${e===r.emoji?"#2C2417":"transparent"};background:${e===r.emoji?"#F2EFE9":"transparent"};font-size:18px;cursor:pointer;">${e}</button>`).join("")}
    </div>
    <p style="font-size:12px;font-weight:700;color:#6B5E4A;margin-bottom:6px;">이름</p>
    <input class="inp" id="et" value="${esc(r.title)}" style="margin-bottom:12px;"/>
    <p style="font-size:12px;font-weight:700;color:#6B5E4A;margin-bottom:8px;">카테고리</p>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;" id="cp">
      ${CATS.slice(1).map(c=>`<button onclick="pickC(this,'${c}')" style="padding:7px 13px;border-radius:100px;border:2px solid ${c===r.cat?"#2C2417":"#E0D8CE"};background:${c===r.cat?"#2C2417":"transparent"};color:${c===r.cat?"#F2EFE9":"#6B5E4A"};font-size:13px;font-weight:600;cursor:pointer;">${CE[c]} ${c}</button>`).join("")}
    </div>
    <div class="brow">
      <button class="bg" onclick="openDetail('${id}')">취소</button>
      <button style="flex:2;padding:14px;border-radius:14px;border:none;background:#2C2417;color:#F2EFE9;font-size:14px;font-weight:700;cursor:pointer;" onclick="saveEdit('${id}')">저장</button>
    </div>`;
}

function pickE(btn,e){
  document.querySelectorAll("#ep button").forEach(b=>{b.style.borderColor="transparent";b.style.background="transparent";});
  btn.style.borderColor="#2C2417";btn.style.background="#F2EFE9";
  editEmoji=e;
}
function pickC(btn,c){
  document.querySelectorAll("#cp button").forEach(b=>{b.style.borderColor="#E0D8CE";b.style.background="transparent";b.style.color="#6B5E4A";});
  btn.style.borderColor="#2C2417";btn.style.background="#2C2417";btn.style.color="#F2EFE9";
  editCat=c;
}
function saveEdit(id){
  const t=document.getElementById("et").value.trim();
  if(!t)return;
  const r=recipes.find(x=>x.id===id);if(!r)return;
  r.title=t;r.emoji=editEmoji;r.cat=editCat;
  save();render();openDetail(id);
}

document.getElementById("fab").onclick=openAdd;
load();render();
</script>
</body>
</html>
